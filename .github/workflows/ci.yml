name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run linting
        run: uv run ruff check .

      - name: Run formatting check
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest -v

  dogfood:
    # The tool analyzes its own repository: real-data smoke test for the whole
    # pipeline (git extraction, hotspots, auto X-Ray, JSON integrity).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0  # bbu reads git history; a shallow clone sees one commit

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: bbu analyzes bbu (hotspots + auto X-Ray)
        run: |
          uv run bbu analyze-repo --days 90 --no-ci > analysis.json
          python3 -c "import json; d = json.load(open('analysis.json')); s = d['summary']; assert s['total_files'] > 0, s; assert s['xrayed_files'] > 0, s; assert any(f['functions'] for f in d['files'][:5]), 'no functions in top hotspots'; print('OK:', s['total_files'], 'files,', s['xrayed_files'], 'x-rayed')"

      - name: bbu xray on a known file
        run: |
          uv run bbu xray src/black_box_unlock/cli.py --days 365 > xray.json
          python3 -c "import json; d = json.load(open('xray.json')); assert d['revisions_analyzed'] > 0, d; assert d['functions'], 'no functions attributed'; print('OK:', len(d['functions']), 'functions over', d['revisions_analyzed'], 'revisions')"
