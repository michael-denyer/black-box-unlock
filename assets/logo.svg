<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="glow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#e879f9"/>
    </linearGradient>
  </defs>

  <!-- Box body -->
  <rect x="20" y="40" width="60" height="45" rx="4" fill="#1f2937"/>

  <!-- Lid floating above, tilted -->
  <rect x="16" y="18" width="64" height="14" rx="3" fill="#374151" transform="rotate(-8 48 25)"/>

  <!-- Keyhole shape on box -->
  <circle cx="50" cy="58" r="8" fill="#0f172a"/>
  <rect x="46" y="58" width="8" height="14" fill="#0f172a"/>

  <!-- Light coming through keyhole -->
  <circle cx="50" cy="58" r="6" fill="url(#glow)" opacity="0.9"/>
  <rect x="47" y="58" width="6" height="12" fill="url(#glow)" opacity="0.9"/>

  <!-- Key inserted at angle -->
  <g transform="translate(50 58) rotate(-30)">
    <!-- Key shaft -->
    <rect x="-3" y="-35" width="6" height="30" rx="2" fill="#fbbf24"/>
    <!-- Key head (bow) -->
    <circle cx="0" cy="-38" r="10" fill="#fbbf24"/>
    <circle cx="0" cy="-38" r="5" fill="#1f2937"/>
    <!-- Key teeth -->
    <rect x="3" y="-12" width="5" height="4" fill="#fbbf24"/>
    <rect x="3" y="-20" width="4" height="3" fill="#fbbf24"/>
  </g>

  <!-- Glow rays from gap -->
  <path d="M30 36 L50 22 L70 36" stroke="url(#glow)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
</svg>
